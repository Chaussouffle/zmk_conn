CONFIG_BT_CENTRAL=y
CONFIG_BT_PERIPHERAL=n
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

CONFIG_BT_SETTINGS=y          # stocke les bonds, évite des états “bizarres” après reboot
CONFIG_BT_MAX_CONN=1          # un seul lien BLE (vers le clavier)
CONFIG_BT_MAX_PAIRED=1        # un seul clavier “pairé”
CONFIG_ZMK_BLE_PROFILE_COUNT=1

CONFIG_USB_DEVICE_PRODUCT="ddullboy"

