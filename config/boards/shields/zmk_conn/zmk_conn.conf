# Dongle-only: USB vers l’hôte, BLE central vers le clavier
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="ddullboy"

CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

CONFIG_ZMK_BLE=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_PERIPHERAL=n

CONFIG_BT_SETTINGS=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_ZMK_BLE_PROFILE_COUNT=1
