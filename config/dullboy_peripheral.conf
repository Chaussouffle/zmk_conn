# BLE
CONFIG_ZMK_BLE=y
CONFIG_BT_CENTRAL=y

# Split central (dongle / récepteur)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# USB HID vers le PC
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_STACK=y

# Pas de scan clavier sur le dongle
CONFIG_KSCAN=n

# Optionnel
CONFIG_ZMK_BLE_PROFILE_COUNT=4
CONFIG_BT_MAX_CONN=1
